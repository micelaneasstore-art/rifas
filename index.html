<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa Automática - APP</title>

<!-- Móvil Responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<!-- Excel Reader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Excel Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.core.min.js"></script>

<style>
    body { 
        font-family: 'Montserrat', Arial, sans-serif; 
        background:#ffe9bf;
        margin:0;
        overflow-x:hidden;
        color:#333;
    }

    /* Encabezado estilo app */
    #topbar {
        background:#d62828;
        color:white;
        text-align:center;
        padding:18px;
        font-size:26px;
        font-weight:bold;
        position:fixed;
        top:0;
        width:100%;
        z-index:10;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }

    .page {
        padding:100px 20px 20px;
        box-sizing:border-box;
    }

    /* Tarjetas */
    .card {
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        margin-bottom:25px;
    }

    /* Botones estilo app */
    .btn {
        width:100%;
        padding:18px;
        font-size:22px;
        border:0;
        border-radius:12px;
        font-weight:bold;
        cursor:pointer;
        margin-top:12px;
        transition:0.2s;
    }

    .btn-primary { background:#0077ff; color:white; }
    .btn-primary:hover { background:#0059c9; }

    .btn-danger { background:#d62828; color:white; }
    .btn-danger:hover { background:#b51f1f; }

    /* Inputs */
    input, textarea {
        width:100%;
        padding:15px;
        font-size:18px;
        border-radius:12px;
        border:2px solid #ccc;
        margin-top:8px;
        box-sizing:border-box;
    }

    /* Ganadores */
    #ganadores div {
        background:#fff3a3;
        padding:15px;
        font-size:22px;
        border-radius:12px;
        margin-top:12px;
        border-left:6px solid #d62828;
    }

    /* Ruleta */
    #ruletaBox {
        display:none;
        text-align:center;
        margin-top:20px;
    }

#ruleta {
    width:90%;
    max-width:350px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
    text-align:center;
}

#ruleta-inner {
    font-size:48px;
    font-weight:bold;
    transition:transform 5s ease-out;
    display:block;
}

    /* Contador */
    #contador {
        display:none;
        font-size:80px;
        font-weight:bold;
        text-align:center;
        margin-top:25px;
        color:#d62828;
    }

    @media (max-width:480px) {
        #ruleta { font-size:40px; padding:20px; }
        #contador { font-size:60px; }
        .btn { font-size:20px; padding:16px; }
        input, textarea { font-size:16px; }
    }
</style>
</head>
<body>

<div id="topbar">
    🎉 RIFA AUTOMÁTICA
</div>

<!-- CONFIGURACIÓN -->
<div id="configuracion" class="page">
    <div class="card">
        <h2 style="text-align:center;">⚙️ Configuración</h2>

        <label>Cantidad de Premios:</label>
        <input type="number" id="cantidadPremios">

        <label style="margin-top:15px;">Descripción de los premios (uno por línea):</label>
        <textarea id="listaPremios" rows="5"></textarea>

        <label style="margin-top:15px;">Archivo Excel (Número | Nombre):</label>
        <input type="file" id="inputExcel" accept=".xlsx,.xls">

        <button class="btn btn-primary" onclick="generarRifaFinal()">🚀 Ir a la Rifa Final</button>
    </div>
</div>

<!-- RIFA FINAL -->
<div id="rifaFinal" class="page" style="display:none;">
    <div class="card">
        <h2 style="text-align:center;">🎁 Sorteo en Vivo</h2>

        <div id="botonesPremios"></div>

        <div id="contador"></div>

        <div id="ruletaBox">
           
              <div id="ruleta-inner">🎡</div>
           
        </div>

        <h3>👑 Ganadores:</h3>
        <div id="ganadores"></div>

        <button class="btn btn-primary" onclick="exportarExcel()">📥 Exportar Ganadores</button>
        <button class="btn btn-danger" onclick="resetRifa()">🔄 Reiniciar Rifa</button>
    </div>
</div>

<!-- Sonido -->
<audio id="sonidoRuleta">
    <source src="https://www.soundjay.com/mechanical/sounds/slot-machine-1.mp3" type="audio/mpeg">
</audio>

<script>
/* MISMO CÓDIGO LÓGICO, SIN CAMBIOS */
let boletos = [];
let ganadores = new Set();
let premios = [];
let listaGanadores = [];

document.getElementById("inputExcel").addEventListener("change", (e) => {
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = (e) => {
        let data = new Uint8Array(e.target.result);
        let wb = XLSX.read(data, { type: "array" });
        let sheet = wb.Sheets[wb.SheetNames[0]];
        let rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        boletos = [];
        rows.forEach(r => { if (r[0] && r[1]) boletos.push({ numero:r[0], nombre:r[1] }); });
        alert("Excel cargado con " + boletos.length + " boletos.");
    };
    reader.readAsArrayBuffer(file);
});

function generarRifaFinal(){
    let cantidad = parseInt(document.getElementById("cantidadPremios").value);
    premios = document.getElementById("listaPremios").value.trim().split("\n");

    if(!cantidad || premios.length !== cantidad){
        alert("La cantidad NO coincide con la lista.");
        return;
    }
    if(boletos.length === 0){
        alert("Sube un Excel primero.");
        return;
    }

    document.getElementById("configuracion").style.display="none";
    document.getElementById("rifaFinal").style.display="block";

    generarBotonesPremios();
}

function generarBotonesPremios(){
    let cont = document.getElementById("botonesPremios");
    cont.innerHTML="";
    premios.forEach((premio, i)=>{
        let b = document.createElement("button");
        b.className="btn btn-primary";
        b.textContent=`🎁 Sortear Premio ${i+1}: ${premio}`;
        b.onclick=()=> iniciarSorteo(i+1,premio,b);
        cont.appendChild(b);
    });
}

function iniciarSorteo(numPremio,premio,btn){
    let disponibles = boletos.filter(b=>!ganadores.has(b.numero));
    if(disponibles.length===0){ alert("Sin boletos disponibles."); return; }

    let ganador = disponibles[Math.floor(Math.random()*disponibles.length)];

    let contador=document.getElementById("contador");
    contador.style.display="block";
    contador.innerHTML="3";
    let c=3;

    let t=setInterval(()=>{
        c--;
        contador.innerHTML=c;
        if(c===0){
            clearInterval(t);
            contador.style.display="none";
            girarRuleta(ganador,numPremio,premio,btn);
        }
    },1000);
}

function girarRuleta(ganador,numPremio,premio,btn){
    let ruleta=document.getElementById("ruleta");
    let sonido=document.getElementById("sonidoRuleta");

    document.getElementById("ruletaBox").style.display="block";
    ruleta.innerHTML="🎡";
    ruleta.style.transform="rotate(0deg)";

    sonido.currentTime=0;
    sonido.play();

    let giros = 720 + Math.floor(Math.random()*360);

    setTimeout(()=>{ ruleta.style.transform=`rotate(${giros}deg)`; },50);

    setTimeout(()=>{
        sonido.pause();
        ruleta.innerHTML=`🎫 ${ganador.numero}<br>👤 ${ganador.nombre}`;
        ganadores.add(ganador.numero);
        btn.disabled=true;

        mostrarGanador(numPremio,premio,ganador);
        lanzarConfeti();
    },3000);
}

function lanzarConfeti(){
    const end = Date.now() + 1200;
    (function frame(){
        confetti({ particleCount:6, spread:70 });
        if(Date.now() < end) requestAnimationFrame(frame);
    })();
}

function mostrarGanador(numPremio,premio,ganador){
    let d=document.createElement("div");
    d.innerHTML=`
        <b>Premio ${numPremio}: ${premio}</b><br>
        🎫 Boleto: <b>${ganador.numero}</b><br>
        👤 ${ganador.nombre}
    `;
    document.getElementById("ganadores").appendChild(d);

    listaGanadores.push({
        Premio: premio,
        Numero: ganador.numero,
        Nombre: ganador.nombre
    });
}

function exportarExcel(){
    if(listaGanadores.length===0) return alert("No hay ganadores.");
    let ws=XLSX.utils.json_to_sheet(listaGanadores);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Ganadores");
    XLSX.writeFile(wb,"Ganadores_Rifa.xlsx");
}

function resetRifa(){ location.reload(); }
</script>

</body>
</html>
